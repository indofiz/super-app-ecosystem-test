<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 820" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="12">
  <title>TLS / ACME Bootstrap</title>
  <desc>The chicken-and-egg problem: Let's Encrypt's HTTP-01 challenge needs nginx serving on :80 before any cert exists. Solution — boot the stack HTTP-only, run certbot in a one-shot container that writes to a webroot volume shared with nginx, symlink the issued cert, then flip the TLS flag and recreate only nginx.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <marker id="arrow-data" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1d4ed8"/>
    </marker>
    <marker id="arrow-out" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9f1239"/>
    </marker>
    <style>
      .label-title { font-weight:700; font-size:14px; fill:#0f172a; }
      .label-sub   { font-size:11px; fill:#475569; }
      .section-title { font-weight:700; font-size:15px; fill:#0f172a; }

      .phase-box   { fill:#ffffff; stroke:#0f172a; stroke-width:1.5; rx:12; }
      .phase-title { font-weight:700; font-size:13px; fill:#0f172a; }
      .phase-meta  { font-family:ui-monospace, SFMono-Regular, Menlo, monospace; font-size:11px; fill:#1f2937; }

      .badge-http  { fill:#fee2e2; stroke:#b91c1c; }
      .badge-tls   { fill:#dcfce7; stroke:#15803d; }
      .badge-text  { font-size:10.5px; font-weight:700; }

      .box-edge   { fill:#f1f5f9; stroke:#334155; stroke-width:1.5; rx:8; }
      .box-cert   { fill:#fef3c7; stroke:#b45309; stroke-width:1.5; rx:8; }
      .box-ext    { fill:#fde2e7; stroke:#9f1239; stroke-width:1.5; stroke-dasharray:5,4; rx:8; }
      .box-vol    { fill:#faf5ff; stroke:#6d28d9; stroke-width:1.5; stroke-dasharray:4,3; rx:6; }

      .edge        { stroke:#475569; stroke-width:1.5; fill:none; }
      .edge-data   { stroke:#1d4ed8; stroke-width:1.8; fill:none; }
      .edge-out    { stroke:#9f1239; stroke-width:1.8; fill:none; stroke-dasharray:5,4; }

      .step-circle { fill:#1d4ed8; }
      .step-text   { fill:#ffffff; font-weight:700; font-size:11px; }

      .note        { fill:#fef9c3; stroke:#a16207; stroke-width:1; rx:6; }
      .note-text   { font-size:11px; fill:#713f12; }
    </style>
  </defs>

  <text x="540" y="28" text-anchor="middle" class="label-title" font-size="18">TLS / ACME Bootstrap — HTTP-only → cert issue → flip → renew</text>
  <text x="540" y="48" text-anchor="middle" class="label-sub">Why we don't ship with a self-signed cert: Let's Encrypt HTTP-01 is simplest, and the TLS overlay is just a template swap. Total downtime: nginx restart only.</text>

  <!-- T0: HTTP-only boot -->
  <rect class="phase-box" x="40" y="80" width="320" height="280"/>
  <text x="56" y="104" class="phase-title">T0 — first boot (HTTP only)</text>
  <text x="56" y="124" class="phase-meta">NGINX_TLS_ENABLED=false  (.env)</text>

  <rect class="box-edge" x="60" y="140" width="120" height="50"/>
  <text x="120" y="160" text-anchor="middle" class="label-title">nginx :80</text>
  <text x="120" y="178" text-anchor="middle" class="label-sub">conf.d template</text>

  <rect class="badge-http" x="200" y="148" width="120" height="34" rx="6"/>
  <text x="260" y="162" text-anchor="middle" class="badge-text" fill="#9f1239">listen 80 only</text>
  <text x="260" y="176" text-anchor="middle" class="label-sub">:443 inert</text>

  <rect class="box-vol" x="60" y="210" width="260" height="50"/>
  <text x="190" y="230" text-anchor="middle" class="label-title" fill="#6d28d9">volume: certbot-webroot</text>
  <text x="190" y="246" text-anchor="middle" class="label-sub">empty; mounted at /var/www/certbot</text>

  <text x="56" y="284" class="label-sub" font-weight="700">Smoke test (from VPS):</text>
  <text x="56" y="302" class="phase-meta">curl http://localhost/nginx-health</text>
  <text x="56" y="320" class="phase-meta">curl http://localhost/readyz</text>
  <text x="56" y="346" class="label-sub" fill="#9f1239">Mobile cannot use this yet — needs TLS.</text>

  <!-- Arrow T0 -> T1 -->
  <line x1="362" y1="220" x2="378" y2="220" class="edge" marker-end="url(#arrow)"/>

  <!-- T1: ACME challenge -->
  <rect class="phase-box" x="380" y="80" width="320" height="280"/>
  <text x="396" y="104" class="phase-title">T1 — one-shot certbot --webroot</text>
  <text x="396" y="124" class="phase-meta">docker run --rm certbot/certbot ...</text>

  <rect class="box-cert" x="396" y="140" width="120" height="50"/>
  <text x="456" y="160" text-anchor="middle" class="label-title">certbot</text>
  <text x="456" y="178" text-anchor="middle" class="label-sub">one-shot</text>

  <rect class="box-edge" x="540" y="140" width="140" height="50"/>
  <text x="610" y="160" text-anchor="middle" class="label-title">nginx :80</text>
  <text x="610" y="178" text-anchor="middle" class="label-sub">serves /.well-known/</text>

  <rect class="box-ext" x="540" y="206" width="140" height="44"/>
  <text x="610" y="226" text-anchor="middle" class="label-title">Let's Encrypt</text>
  <text x="610" y="242" text-anchor="middle" class="label-sub">ACME validator</text>

  <rect class="box-vol" x="396" y="206" width="120" height="44"/>
  <text x="456" y="226" text-anchor="middle" class="label-title" fill="#6d28d9">webroot</text>
  <text x="456" y="242" text-anchor="middle" class="label-sub">/var/www/certbot</text>

  <!-- Arrows for T1 -->
  <circle cx="408" cy="200" r="10" class="step-circle"/><text x="408" y="204" text-anchor="middle" class="step-text">1</text>
  <line x1="456" y1="190" x2="456" y2="204" class="edge" marker-end="url(#arrow)"/>
  <text x="370" y="200" text-anchor="end" class="label-sub">write challenge</text>

  <circle cx="612" cy="200" r="10" class="step-circle"/><text x="612" y="204" text-anchor="middle" class="step-text">2</text>
  <line x1="610" y1="206" x2="610" y2="190" class="edge" marker-end="url(#arrow)"/>
  <text x="720" y="200" class="label-sub">read same volume</text>

  <circle cx="612" cy="270" r="10" class="step-circle"/><text x="612" y="274" text-anchor="middle" class="step-text">3</text>
  <path d="M 540 226 C 510 270 480 270 460 280" class="edge-out" marker-end="url(#arrow-out)"/>
  <text x="500" y="290" class="label-sub" fill="#9f1239">HTTP-01 GET → nginx → 200</text>

  <rect class="box-vol" x="396" y="290" width="284" height="40"/>
  <text x="538" y="312" text-anchor="middle" class="label-title" fill="#6d28d9">bind mount: ./nginx/certs/</text>
  <text x="538" y="326" text-anchor="middle" class="label-sub">cert written here — symlink to flat names</text>

  <text x="396" y="350" class="label-sub" font-weight="700">Result:</text>
  <text x="438" y="350" class="phase-meta">fullchain.pem / privkey.pem / chain.pem</text>

  <!-- Arrow T1 -> T2 -->
  <line x1="702" y1="220" x2="718" y2="220" class="edge" marker-end="url(#arrow)"/>

  <!-- T2: Flip TLS on -->
  <rect class="phase-box" x="720" y="80" width="320" height="280"/>
  <text x="736" y="104" class="phase-title">T2 — flip TLS on, recreate nginx</text>
  <text x="736" y="124" class="phase-meta">NGINX_TLS_ENABLED=true  (.env)</text>
  <text x="736" y="140" class="phase-meta">docker compose up -d --force-recreate nginx</text>

  <rect class="box-edge" x="736" y="156" width="120" height="50"/>
  <text x="796" y="176" text-anchor="middle" class="label-title">nginx :443</text>
  <text x="796" y="194" text-anchor="middle" class="label-sub">conf.d-tls template</text>

  <rect class="badge-tls" x="876" y="164" width="140" height="34" rx="6"/>
  <text x="946" y="178" text-anchor="middle" class="badge-text" fill="#15803d">TLSv1.2 + 1.3</text>
  <text x="946" y="192" text-anchor="middle" class="label-sub">HSTS, OCSP stapling</text>

  <text x="736" y="226" class="label-sub" font-weight="700">15-select-tls.envsh:</text>
  <text x="736" y="242" class="phase-meta">if NGINX_TLS_ENABLED=true →</text>
  <text x="736" y="256" class="phase-meta">  swap conf.d-tls/* into conf.d/</text>
  <text x="736" y="272" class="phase-meta">  → envsubst → reload</text>

  <text x="736" y="300" class="label-sub" font-weight="700">No need to touch:</text>
  <text x="736" y="316" class="label-sub">  • BFF / Kong / Redis / sample-service</text>
  <text x="736" y="332" class="label-sub">  • cert volumes (still bind-mounted)</text>
  <text x="736" y="348" class="label-sub">  • Compose deps (nginx restarts solo)</text>

  <!-- Renewal loop (bottom) -->
  <rect class="phase-box" x="40" y="400" width="1000" height="180"/>
  <text x="56" y="424" class="phase-title">T+∞ — renewal (weekly cron under deploy user)</text>

  <rect class="box-cert" x="60" y="442" width="180" height="80"/>
  <text x="150" y="464" text-anchor="middle" class="label-title">certbot renew</text>
  <text x="150" y="482" text-anchor="middle" class="label-sub">no-op if &gt;30d to expiry</text>
  <text x="150" y="498" text-anchor="middle" class="label-sub">runs in one-shot container</text>
  <text x="150" y="514" text-anchor="middle" class="label-sub">no nginx downtime</text>

  <rect class="box-edge" x="280" y="442" width="180" height="80"/>
  <text x="370" y="464" text-anchor="middle" class="label-title">nginx -s reload</text>
  <text x="370" y="482" text-anchor="middle" class="label-sub">SIGHUP via docker exec</text>
  <text x="370" y="498" text-anchor="middle" class="label-sub">picks up new fullchain</text>
  <text x="370" y="514" text-anchor="middle" class="label-sub">existing conns kept</text>

  <line x1="240" y1="482" x2="278" y2="482" class="edge" marker-end="url(#arrow)"/>
  <text x="258" y="472" text-anchor="middle" class="label-sub">on success</text>

  <rect class="note" x="500" y="442" width="520" height="80"/>
  <text x="514" y="460" class="note-text" font-weight="700">crontab (deploy user)</text>
  <text x="514" y="478" class="note-text">17 3 * * * cd ~/super-app &amp;&amp; docker run --rm \</text>
  <text x="514" y="492" class="note-text">  -v "$(pwd)/nginx/certs:/etc/letsencrypt" \</text>
  <text x="514" y="506" class="note-text">  -v "super-app-ecosystem-test_certbot-webroot:/var/www/certbot" \</text>
  <text x="514" y="520" class="note-text">  certbot/certbot:latest renew --quiet \</text>
  <text x="514" y="534" class="note-text">  &amp;&amp; docker compose exec nginx nginx -s reload</text>

  <!-- Footer: the chicken-and-egg explanation -->
  <g transform="translate(40,610)">
    <rect class="phase-box" x="0" y="0" width="1000" height="170"/>
    <text x="14" y="22" class="label-title">Why this exact order</text>
    <text x="14" y="42" class="label-sub">• Let's Encrypt HTTP-01 needs nginx serving :80 on the public hostname BEFORE any cert exists. A self-signed cert would let nginx start on :443 sooner but breaks mobile pinning later.</text>
    <text x="14" y="60" class="label-sub">• The /.well-known/acme-challenge/ block lives in BOTH HTTP and TLS templates so renewals work after the flip — same webroot volume, same nginx routing.</text>
    <text x="14" y="78" class="label-sub">• Symlinking from live/&lt;host&gt;/ to flat fullchain.pem / privkey.pem / chain.pem decouples nginx from certbot's directory layout — nginx config never has to change between issuance and renewal.</text>
    <text x="14" y="96" class="label-sub">• Recreate ONLY nginx at T2 — leaves BFF / Kong / Redis untouched (the auth ceremony is still keyed off PUBLIC_BASE_URL which already uses https://, so no client-side cutover is needed when TLS comes up).</text>
    <text x="14" y="118" class="label-sub" fill="#9f1239" font-weight="700">DNS A record MUST be correct BEFORE T1. Otherwise certbot burns Let's Encrypt rate-limit quota retrying and locks you out of issuance for hours.</text>
    <text x="14" y="138" class="label-sub" fill="#9f1239" font-weight="700">Verify with:  curl ifconfig.me  vs  dig +short api.pangkalpinangkota.go.id  — both must match before running certbot.</text>
    <text x="14" y="158" class="label-sub">Reference: docs/DEPLOYMENT.md §9–11 (HTTP boot, certbot, TLS flip) and §14 (renewal cron). nginx/AUDIT.md §S-1 covers the TLS overlay design.</text>
  </g>
</svg>
