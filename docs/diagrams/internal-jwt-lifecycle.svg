<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1000" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="12">
  <title>Internal JWT — Anatomy, Lifecycle, Rotation</title>
  <desc>Why kid appears in both header and payload (Kong's lookup), what each lifecycle stage does, and how a zero-downtime kid rotation overlaps two keys for at least TTL + grace.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b45309"/>
    </marker>
    <style>
      .label-title { font-weight:700; font-size:14px; fill:#0f172a; }
      .label-sub   { font-size:11px; fill:#475569; }
      .section-title { font-weight:700; font-size:15px; fill:#0f172a; }

      .panel { fill:#ffffff; stroke:#cbd5e1; stroke-width:1; rx:10; }

      .seg-header { fill:#fee2e2; stroke:#b91c1c; stroke-width:1.5; rx:10; }
      .seg-payload { fill:#dcfce7; stroke:#15803d; stroke-width:1.5; rx:10; }
      .seg-sig    { fill:#e2e8f0; stroke:#475569; stroke-width:1.5; rx:10; }
      .seg-title  { font-weight:700; font-size:13px; }
      .seg-text   { font-family:ui-monospace, SFMono-Regular, Menlo, monospace; font-size:11px; fill:#1f2937; }

      .stage      { fill:#fef3c7; stroke:#b45309; stroke-width:1.5; rx:10; }
      .stage-title{ font-weight:700; font-size:13px; fill:#92400e; }
      .stage-text { font-size:11px; fill:#1f2937; }

      .timeline-bar { fill:#dbeafe; stroke:#1d4ed8; stroke-width:1.5; rx:8; }
      .timeline-bar-v2 { fill:#fce7f3; stroke:#be185d; stroke-width:1.5; rx:8; }
      .timeline-divider { stroke:#94a3b8; stroke-width:1; stroke-dasharray:4,3; }
      .tl-title   { font-weight:700; font-size:11px; fill:#0f172a; }
      .tl-sub     { font-size:11px; fill:#475569; }

      .key-pill { font-family:ui-monospace, SFMono-Regular, Menlo, monospace; font-size:11px; }
      .highlight { fill:#fef9c3; stroke:#a16207; stroke-width:1; rx:4; }
    </style>
  </defs>

  <text x="540" y="28" text-anchor="middle" class="label-title" font-size="18">Internal JWT — Anatomy, Lifecycle, Rotation</text>
  <text x="540" y="48" text-anchor="middle" class="label-sub">RS256, TTL 5 min. BFF holds the private key only. Kong holds the public PEM keyed by kid.</text>

  <!-- SECTION 1: ANATOMY -->
  <text x="60" y="86" class="section-title">1. Anatomy — why kid appears twice</text>

  <!-- Header panel -->
  <rect class="seg-header" x="60" y="100" width="300" height="180"/>
  <text x="76" y="122" class="seg-title" fill="#b91c1c">Header (RFC 7515)</text>
  <text x="76" y="146" class="seg-text">{</text>
  <text x="88" y="162" class="seg-text">"alg": "RS256",</text>
  <text x="88" y="178" class="seg-text">"typ": "JWT",</text>
  <rect class="highlight" x="80" y="186" width="240" height="20"/>
  <text x="88" y="201" class="seg-text" fill="#713f12">"kid": "dev-v1"     ← standard</text>
  <text x="76" y="220" class="seg-text">}</text>
  <text x="76" y="252" class="label-sub" fill="#7f1d1d">Used by libraries that look up</text>
  <text x="76" y="266" class="label-sub" fill="#7f1d1d">keys via the JOSE header.</text>

  <!-- Payload panel -->
  <rect class="seg-payload" x="380" y="100" width="340" height="180"/>
  <text x="396" y="122" class="seg-title" fill="#15803d">Payload (claims)</text>
  <text x="396" y="142" class="seg-text">{ "iss":"super-app-bff", "aud":"super-app-services",</text>
  <text x="406" y="158" class="seg-text">"sub":"&lt;kc user id&gt;", "sid":"&lt;bff session id&gt;",</text>
  <text x="406" y="174" class="seg-text">"iat":1746788400, "nbf":1746788400,</text>
  <text x="406" y="190" class="seg-text">"exp":1746788700, "jti":"&lt;uuid&gt;",</text>
  <rect class="highlight" x="400" y="198" width="320" height="20"/>
  <text x="406" y="213" class="seg-text" fill="#713f12">"kid":"dev-v1",         ← DUPLICATED for Kong</text>
  <text x="406" y="230" class="seg-text">"username":"...", "email":"...", "roles":[ ... ] }</text>
  <text x="396" y="254" class="label-sub" fill="#14532d">Kong's bundled jwt plugin is configured</text>
  <text x="396" y="268" class="label-sub" fill="#14532d">key_claim_name=kid (a payload claim).</text>

  <!-- Signature panel -->
  <rect class="seg-sig" x="740" y="100" width="280" height="180"/>
  <text x="756" y="122" class="seg-title" fill="#334155">Signature</text>
  <text x="756" y="146" class="seg-text">RSASSA-PKCS1-v1_5</text>
  <text x="756" y="162" class="seg-text">+ SHA-256</text>
  <text x="756" y="184" class="seg-text">over:</text>
  <text x="766" y="200" class="seg-text">base64url(header) +</text>
  <text x="766" y="216" class="seg-text">"." + base64url(payload)</text>
  <text x="756" y="242" class="label-sub">Signed by the BFF's private</text>
  <text x="756" y="256" class="label-sub">key — never leaves the BFF.</text>
  <text x="756" y="270" class="label-sub">Kong verifies with the public</text>
  <text x="756" y="284" class="label-sub">PEM matching the payload kid.</text>

  <!-- SECTION 2: LIFECYCLE -->
  <text x="60" y="320" class="section-title">2. Lifecycle — mint → carry → verify → inject</text>

  <!-- 4 stages -->
  <rect class="stage" x="60"  y="340" width="220" height="180"/>
  <text x="170" y="362" text-anchor="middle" class="stage-title">A. MINT (BFF)</text>
  <text x="76" y="386" class="stage-text">• /auth/token or /auth/refresh</text>
  <text x="76" y="402" class="stage-text">• importPKCS8 (private key)</text>
  <text x="76" y="418" class="stage-text">• setIssuer, setAudience</text>
  <text x="76" y="434" class="stage-text">• setSubject(claims.sub)</text>
  <text x="76" y="450" class="stage-text">• setIssuedAt, setNotBefore('0s')</text>
  <text x="76" y="466" class="stage-text">• setExpirationTime(`${TTL}s`)</text>
  <text x="76" y="482" class="stage-text">• kid in header AND payload</text>
  <text x="76" y="498" class="stage-text">• jti = randomUUID()</text>
  <text x="76" y="514" class="stage-text">• .sign(privateKey)</text>

  <rect class="stage" x="300" y="340" width="220" height="180"/>
  <text x="410" y="362" text-anchor="middle" class="stage-title">B. CARRY (Mobile)</text>
  <text x="316" y="386" class="stage-text">• secureStore.writeSession</text>
  <text x="316" y="402" class="stage-text">  → accessToken + sessionId</text>
  <text x="316" y="418" class="stage-text">    + expiresAt (iOS Keychain /</text>
  <text x="316" y="434" class="stage-text">    Android Keystore-backed)</text>
  <text x="316" y="456" class="stage-text">• Dio _AuthInterceptor adds</text>
  <text x="316" y="472" class="stage-text">  Authorization: Bearer &lt;jwt&gt;</text>
  <text x="316" y="494" class="stage-text">• Refresh interceptor catches</text>
  <text x="316" y="510" class="stage-text">  one 401 → /auth/refresh</text>

  <rect class="stage" x="540" y="340" width="220" height="180"/>
  <text x="650" y="362" text-anchor="middle" class="stage-title">C. VERIFY (Kong jwt)</text>
  <text x="556" y="386" class="stage-text">• Read Authorization only</text>
  <text x="556" y="402" class="stage-text">  (cookie / uri carriers off)</text>
  <text x="556" y="424" class="stage-text">• Decode header → kid</text>
  <text x="556" y="440" class="stage-text">  Lookup consumer credential</text>
  <text x="556" y="456" class="stage-text">  with key == kid</text>
  <text x="556" y="478" class="stage-text">• RS256 verify with</text>
  <text x="556" y="494" class="stage-text">  rsa_public_key</text>
  <text x="556" y="510" class="stage-text">• check exp, nbf, max_exp=600s</text>

  <rect class="stage" x="780" y="340" width="240" height="180"/>
  <text x="900" y="362" text-anchor="middle" class="stage-title">D. INJECT (Kong pre-function)</text>
  <text x="796" y="386" class="stage-text">• Strip caller X-User-Id,</text>
  <text x="796" y="402" class="stage-text">  X-Roles, X-Session-Id</text>
  <text x="796" y="424" class="stage-text">• Decode payload (base64url</text>
  <text x="796" y="440" class="stage-text">  + cjson.safe)</text>
  <text x="796" y="462" class="stage-text">• Enforce iss / aud</text>
  <text x="796" y="484" class="stage-text">• Set X-User-Id=sub, X-Roles,</text>
  <text x="796" y="500" class="stage-text">  X-Session-Id from claims</text>
  <text x="796" y="516" class="stage-text">• CLEAR Authorization upstream</text>

  <!-- Arrows between stages -->
  <line x1="280" y1="430" x2="298" y2="430" stroke="#b45309" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <line x1="520" y1="430" x2="538" y2="430" stroke="#b45309" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <line x1="760" y1="430" x2="778" y2="430" stroke="#b45309" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <!-- SECTION 3: ROTATION TIMELINE -->
  <text x="60" y="556" class="section-title">3. Zero-downtime rotation — kid dev-v1 → dev-v2</text>
  <text x="60" y="574" class="label-sub">Both BFF and Kong support multiple kids simultaneously. The active kid is what BFF signs with; Kong verifies whatever it has on file.</text>

  <!-- Time axis -->
  <line x1="80" y1="640" x2="1020" y2="640" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="1024" y="644" class="label-sub">time</text>

  <!-- Phase markers on axis -->
  <line x1="180" y1="630" x2="180" y2="650" class="timeline-divider"/>
  <line x1="370" y1="630" x2="370" y2="650" class="timeline-divider"/>
  <line x1="560" y1="630" x2="560" y2="650" class="timeline-divider"/>
  <line x1="780" y1="630" x2="780" y2="650" class="timeline-divider"/>
  <line x1="940" y1="630" x2="940" y2="650" class="timeline-divider"/>

  <text x="180" y="668" text-anchor="middle" class="tl-title">T0 baseline</text>
  <text x="370" y="668" text-anchor="middle" class="tl-title">T1 add v2 to Kong</text>
  <text x="560" y="668" text-anchor="middle" class="tl-title">T2 cut BFF over</text>
  <text x="780" y="668" text-anchor="middle" class="tl-title">T3 wait TTL + grace</text>
  <text x="940" y="668" text-anchor="middle" class="tl-title">T4 drop v1</text>

  <!-- Bars: BFF signing key -->
  <text x="60" y="708" class="tl-sub">BFF active kid (signs new tokens)</text>
  <rect class="timeline-bar" x="80" y="690" width="480" height="22"/>
  <text x="320" y="706" text-anchor="middle" class="key-pill" fill="#1e3a8a">kid=dev-v1</text>
  <rect class="timeline-bar-v2" x="560" y="690" width="460" height="22"/>
  <text x="790" y="706" text-anchor="middle" class="key-pill" fill="#831843">kid=dev-v2</text>

  <!-- Bars: Kong accepted kids -->
  <text x="60" y="752" class="tl-sub">Kong accepted kids (jwt_secrets)</text>
  <rect class="timeline-bar" x="80" y="734" width="860" height="22"/>
  <text x="510" y="750" text-anchor="middle" class="key-pill" fill="#1e3a8a">dev-v1</text>
  <rect class="timeline-bar-v2" x="370" y="734" width="650" height="22"/>
  <text x="695" y="750" text-anchor="middle" class="key-pill" fill="#831843">dev-v2</text>

  <!-- Bars: in-flight tokens by kid -->
  <text x="60" y="796" class="tl-sub">In-flight tokens (alive)</text>
  <rect class="timeline-bar" x="80" y="778" width="700" height="22"/>
  <text x="430" y="794" text-anchor="middle" class="key-pill" fill="#1e3a8a">kid=dev-v1 (any minted at or before T2; expire by T3)</text>
  <rect class="timeline-bar-v2" x="560" y="778" width="460" height="22"/>
  <text x="790" y="794" text-anchor="middle" class="key-pill" fill="#831843">kid=dev-v2 (after T2)</text>

  <!-- Action list -->
  <rect class="panel" x="60" y="820" width="960" height="160" fill="#f8fafc"/>
  <text x="76" y="842" class="label-title">Runbook</text>
  <text x="76" y="860" class="label-sub">T1: append v2 to kong.yml jwt_secrets and set INTERNAL_JWT_PUBKEY_DEV_V2 in docker-compose. Redeploy Kong. (Both kids verify.)</text>
  <text x="76" y="878" class="label-sub">T2: set BFF_INTERNAL_JWT_ACTIVE_KID=dev-v2, swap BFF_INTERNAL_JWT_PRIVATE_KEY, append v2 to BFF_INTERNAL_JWT_PUBLIC_KEYS. Redeploy BFF.</text>
  <text x="76" y="896" class="label-sub">T3: wait BFF_INTERNAL_JWT_TTL_SECONDS + ~1 min (default 6 min) so every v1-signed token has expired.</text>
  <text x="76" y="914" class="label-sub">T4: drop v1 from BFF env and kong.yml; clear INTERNAL_JWT_PUBKEY_DEV_V1. Redeploy.</text>
  <text x="76" y="940" class="label-sub" fill="#9f1239">Pre-flight: node kong/scripts/audit-kid-config.mjs cross-checks bff/.env, .env, kong.yml, docker-compose.yml — run before AND after each step.</text>
  <text x="76" y="960" class="label-sub" fill="#9f1239">Tripwire: dev- vs prod- kid prefix. A prod deploy must use prod-vN; a kid=dev-* ever appearing in prod logs is a configuration alarm.</text>
</svg>
