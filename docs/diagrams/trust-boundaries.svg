<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 820" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="12">
  <title>Trust Boundaries — Who Sees What</title>
  <desc>Matrix of secrets, tokens, and identity values vs the components that may see them. Owns/persists vs transient vs MUST NOT see, including the explicit stripping Kong does on inbound caller headers and the bearer it removes upstream.</desc>

  <defs>
    <style>
      .label-title { font-weight:700; font-size:14px; fill:#0f172a; }
      .label-sub   { font-size:11px; fill:#475569; }
      .section-title { font-weight:700; font-size:15px; fill:#0f172a; }

      .col-header  { font-weight:700; font-size:11px; fill:#0f172a; }
      .col-mobile  { fill:#f0f9ff; stroke:#0369a1; stroke-width:1.5; }
      .col-edge    { fill:#f1f5f9; stroke:#334155; stroke-width:1.5; }
      .col-bff     { fill:#fef3c7; stroke:#b45309; stroke-width:1.5; }
      .col-store   { fill:#ede9fe; stroke:#6d28d9; stroke-width:1.5; }
      .col-kong    { fill:#dbeafe; stroke:#1d4ed8; stroke-width:1.5; }
      .col-svc     { fill:#dcfce7; stroke:#15803d; stroke-width:1.5; }
      .col-ext     { fill:#fde2e7; stroke:#9f1239; stroke-width:1.5; stroke-dasharray:5,4; }

      .row-band-a  { fill:#ffffff; }
      .row-band-b  { fill:#f8fafc; }
      .row-label   { font-size:12px; fill:#0f172a; font-weight:600; }
      .row-sub     { font-size:10px; fill:#64748b; }

      .cell-line   { stroke:#e2e8f0; stroke-width:1; }

      .glyph-own   { font-size:18px; font-weight:700; fill:#15803d; }
      .glyph-trans { font-size:18px; font-weight:700; fill:#b45309; }
      .glyph-pass  { font-size:14px; fill:#475569; }
      .glyph-deny  { font-size:18px; font-weight:700; fill:#b91c1c; }
      .glyph-set   { font-size:12px; font-weight:700; fill:#1d4ed8; }

      .legend-box  { fill:#ffffff; stroke:#cbd5e1; stroke-width:1; rx:8; }
    </style>
  </defs>

  <text x="540" y="28" text-anchor="middle" class="label-title" font-size="18">Trust Boundaries — Who Sees What</text>
  <text x="540" y="48" text-anchor="middle" class="label-sub">Rows are secrets / tokens / identity values. Columns are components. The point of the design is that most cells are blank — each component sees only what it strictly needs.</text>

  <!-- Column headers -->
  <g transform="translate(40,80)">
    <!-- Row label column header -->
    <rect x="0" y="0" width="280" height="60" fill="#0f172a"/>
    <text x="140" y="35" text-anchor="middle" fill="#ffffff" font-weight="700" font-size="13">Secret / Token / Header</text>

    <!-- Component columns -->
    <rect class="col-mobile" x="280" y="0" width="100" height="60"/>
    <text x="330" y="30" text-anchor="middle" class="col-header">Mobile</text>
    <text x="330" y="46" text-anchor="middle" class="row-sub">Flutter</text>

    <rect class="col-edge" x="380" y="0" width="100" height="60"/>
    <text x="430" y="30" text-anchor="middle" class="col-header">nginx</text>
    <text x="430" y="46" text-anchor="middle" class="row-sub">edge proxy</text>

    <rect class="col-bff" x="480" y="0" width="100" height="60"/>
    <text x="530" y="30" text-anchor="middle" class="col-header">BFF</text>
    <text x="530" y="46" text-anchor="middle" class="row-sub">auth boundary</text>

    <rect class="col-store" x="580" y="0" width="100" height="60"/>
    <text x="630" y="30" text-anchor="middle" class="col-header">Redis</text>
    <text x="630" y="46" text-anchor="middle" class="row-sub">session store</text>

    <rect class="col-kong" x="680" y="0" width="100" height="60"/>
    <text x="730" y="30" text-anchor="middle" class="col-header">Kong</text>
    <text x="730" y="46" text-anchor="middle" class="row-sub">data-plane gw</text>

    <rect class="col-svc" x="780" y="0" width="100" height="60"/>
    <text x="830" y="30" text-anchor="middle" class="col-header">service</text>
    <text x="830" y="46" text-anchor="middle" class="row-sub">upstream</text>

    <rect class="col-ext" x="880" y="0" width="100" height="60"/>
    <text x="930" y="30" text-anchor="middle" class="col-header">Keycloak</text>
    <text x="930" y="46" text-anchor="middle" class="row-sub">external IdP</text>
  </g>

  <!-- Data rows -->
  <g transform="translate(40,140)">
    <!-- Row 1: KC client_secret -->
    <rect class="row-band-a" x="0" y="0" width="980" height="40"/>
    <text x="14" y="20" class="row-label">KC client_secret</text>
    <text x="14" y="34" class="row-sub">confidential OAuth client credential</text>
    <text x="330" y="26" text-anchor="middle" class="glyph-pass">—</text>
    <text x="430" y="26" text-anchor="middle" class="glyph-pass">—</text>
    <text x="530" y="26" text-anchor="middle" class="glyph-own">●</text>
    <text x="630" y="26" text-anchor="middle" class="glyph-pass">—</text>
    <text x="730" y="26" text-anchor="middle" class="glyph-pass">—</text>
    <text x="830" y="26" text-anchor="middle" class="glyph-pass">—</text>
    <text x="930" y="26" text-anchor="middle" class="glyph-trans">○</text>

    <!-- Row 2: KC access_token -->
    <rect class="row-band-b" x="0" y="40" width="980" height="40"/>
    <text x="14" y="60" class="row-label">KC access_token</text>
    <text x="14" y="74" class="row-sub">discarded after profile extraction</text>
    <text x="330" y="66" text-anchor="middle" class="glyph-deny">✗</text>
    <text x="430" y="66" text-anchor="middle" class="glyph-pass">—</text>
    <text x="530" y="66" text-anchor="middle" class="glyph-trans">○</text>
    <text x="630" y="66" text-anchor="middle" class="glyph-pass">—</text>
    <text x="730" y="66" text-anchor="middle" class="glyph-deny">✗</text>
    <text x="830" y="66" text-anchor="middle" class="glyph-deny">✗</text>
    <text x="930" y="66" text-anchor="middle" class="glyph-own">●</text>

    <!-- Row 3: KC refresh_token -->
    <rect class="row-band-a" x="0" y="80" width="980" height="40"/>
    <text x="14" y="100" class="row-label">KC refresh_token</text>
    <text x="14" y="114" class="row-sub">long-lived, rotated; never leaves the auth plane</text>
    <text x="330" y="106" text-anchor="middle" class="glyph-deny">✗</text>
    <text x="430" y="106" text-anchor="middle" class="glyph-pass">—</text>
    <text x="530" y="106" text-anchor="middle" class="glyph-trans">○</text>
    <text x="630" y="106" text-anchor="middle" class="glyph-own">●</text>
    <text x="730" y="106" text-anchor="middle" class="glyph-deny">✗</text>
    <text x="830" y="106" text-anchor="middle" class="glyph-deny">✗</text>
    <text x="930" y="106" text-anchor="middle" class="glyph-own">●</text>

    <!-- Row 4: KC id_token -->
    <rect class="row-band-b" x="0" y="120" width="980" height="40"/>
    <text x="14" y="140" class="row-label">KC id_token</text>
    <text x="14" y="154" class="row-sub">verified at /callback; discarded after</text>
    <text x="330" y="146" text-anchor="middle" class="glyph-deny">✗</text>
    <text x="430" y="146" text-anchor="middle" class="glyph-pass">—</text>
    <text x="530" y="146" text-anchor="middle" class="glyph-trans">○</text>
    <text x="630" y="146" text-anchor="middle" class="glyph-pass">—</text>
    <text x="730" y="146" text-anchor="middle" class="glyph-deny">✗</text>
    <text x="830" y="146" text-anchor="middle" class="glyph-deny">✗</text>
    <text x="930" y="146" text-anchor="middle" class="glyph-own">●</text>

    <!-- Row 5: Internal JWT private key -->
    <rect class="row-band-a" x="0" y="160" width="980" height="40"/>
    <text x="14" y="180" class="row-label">Internal JWT private key (RS256)</text>
    <text x="14" y="194" class="row-sub">in BFF process env only; never on disk in prod</text>
    <text x="330" y="186" text-anchor="middle" class="glyph-pass">—</text>
    <text x="430" y="186" text-anchor="middle" class="glyph-pass">—</text>
    <text x="530" y="186" text-anchor="middle" class="glyph-own">●</text>
    <text x="630" y="186" text-anchor="middle" class="glyph-pass">—</text>
    <text x="730" y="186" text-anchor="middle" class="glyph-deny">✗</text>
    <text x="830" y="186" text-anchor="middle" class="glyph-deny">✗</text>
    <text x="930" y="186" text-anchor="middle" class="glyph-deny">✗</text>

    <!-- Row 6: Internal JWT public PEM -->
    <rect class="row-band-b" x="0" y="200" width="980" height="40"/>
    <text x="14" y="220" class="row-label">Internal JWT public PEM</text>
    <text x="14" y="234" class="row-sub">exposed via JWKS; not secret; one entry per kid</text>
    <text x="330" y="226" text-anchor="middle" class="glyph-pass">—</text>
    <text x="430" y="226" text-anchor="middle" class="glyph-pass">—</text>
    <text x="530" y="226" text-anchor="middle" class="glyph-own">●</text>
    <text x="630" y="226" text-anchor="middle" class="glyph-pass">—</text>
    <text x="730" y="226" text-anchor="middle" class="glyph-own">●</text>
    <text x="830" y="226" text-anchor="middle" class="glyph-pass">—</text>
    <text x="930" y="226" text-anchor="middle" class="glyph-pass">—</text>

    <!-- Row 7: Internal JWT (the token) -->
    <rect class="row-band-a" x="0" y="240" width="980" height="40"/>
    <text x="14" y="260" class="row-label">Internal JWT (Bearer)</text>
    <text x="14" y="274" class="row-sub">RS256, TTL 5 min; mobile's only credential</text>
    <text x="330" y="266" text-anchor="middle" class="glyph-own">●</text>
    <text x="430" y="266" text-anchor="middle" class="glyph-pass">↪</text>
    <text x="530" y="266" text-anchor="middle" class="glyph-own">●</text>
    <text x="630" y="266" text-anchor="middle" class="glyph-pass">—</text>
    <text x="730" y="266" text-anchor="middle" class="glyph-trans">○</text>
    <text x="830" y="266" text-anchor="middle" class="glyph-deny">✗</text>
    <text x="930" y="266" text-anchor="middle" class="glyph-deny">✗</text>

    <!-- Row 8: session_id -->
    <rect class="row-band-b" x="0" y="280" width="980" height="40"/>
    <text x="14" y="300" class="row-label">session_id</text>
    <text x="14" y="314" class="row-sub">opaque; required + bound by sid claim on /refresh, /logout</text>
    <text x="330" y="306" text-anchor="middle" class="glyph-own">●</text>
    <text x="430" y="306" text-anchor="middle" class="glyph-pass">↪</text>
    <text x="530" y="306" text-anchor="middle" class="glyph-trans">○</text>
    <text x="630" y="306" text-anchor="middle" class="glyph-own">●</text>
    <text x="730" y="306" text-anchor="middle" class="glyph-pass">—</text>
    <text x="830" y="306" text-anchor="middle" class="glyph-pass">—</text>
    <text x="930" y="306" text-anchor="middle" class="glyph-pass">—</text>

    <!-- Row 9: Profile snapshot -->
    <rect class="row-band-a" x="0" y="320" width="980" height="40"/>
    <text x="14" y="340" class="row-label">Profile snapshot (username / email / roles)</text>
    <text x="14" y="354" class="row-sub">extracted at /token + /refresh; served by /auth/me</text>
    <text x="330" y="346" text-anchor="middle" class="glyph-trans">○</text>
    <text x="430" y="346" text-anchor="middle" class="glyph-pass">↪</text>
    <text x="530" y="346" text-anchor="middle" class="glyph-own">●</text>
    <text x="630" y="346" text-anchor="middle" class="glyph-own">●</text>
    <text x="730" y="346" text-anchor="middle" class="glyph-pass">—</text>
    <text x="830" y="346" text-anchor="middle" class="glyph-pass">—</text>
    <text x="930" y="346" text-anchor="middle" class="glyph-pass">—</text>

    <!-- Row 10: X-User-Id / X-Roles / X-Session-Id -->
    <rect class="row-band-b" x="0" y="360" width="980" height="40"/>
    <text x="14" y="380" class="row-label">X-User-Id / X-Session-Id / X-Roles</text>
    <text x="14" y="394" class="row-sub">caller-supplied STRIPPED first, then set from verified JWT claims</text>
    <text x="330" y="386" text-anchor="middle" class="glyph-deny">✗</text>
    <text x="430" y="386" text-anchor="middle" class="glyph-pass">—</text>
    <text x="530" y="386" text-anchor="middle" class="glyph-pass">—</text>
    <text x="630" y="386" text-anchor="middle" class="glyph-pass">—</text>
    <text x="730" y="386" text-anchor="middle" class="glyph-set">SET</text>
    <text x="830" y="386" text-anchor="middle" class="glyph-own">●</text>
    <text x="930" y="386" text-anchor="middle" class="glyph-pass">—</text>

    <!-- Row 11: X-Request-Id -->
    <rect class="row-band-a" x="0" y="400" width="980" height="40"/>
    <text x="14" y="420" class="row-label">X-Request-Id</text>
    <text x="14" y="434" class="row-sub">caller-supplied OVERWRITTEN at nginx; threaded through to client echo</text>
    <text x="330" y="426" text-anchor="middle" class="glyph-trans">○</text>
    <text x="430" y="426" text-anchor="middle" class="glyph-set">SET</text>
    <text x="530" y="426" text-anchor="middle" class="glyph-trans">○</text>
    <text x="630" y="426" text-anchor="middle" class="glyph-pass">—</text>
    <text x="730" y="426" text-anchor="middle" class="glyph-pass">↪</text>
    <text x="830" y="426" text-anchor="middle" class="glyph-trans">○</text>
    <text x="930" y="426" text-anchor="middle" class="glyph-pass">—</text>

    <!-- Border lines -->
    <line x1="0" y1="0" x2="980" y2="0" class="cell-line"/>
    <line x1="0" y1="440" x2="980" y2="440" class="cell-line"/>
  </g>

  <!-- Legend -->
  <g transform="translate(40,610)">
    <rect class="legend-box" x="0" y="0" width="980" height="190"/>
    <text x="14" y="22" class="label-title">Legend</text>

    <text x="14" y="48" class="glyph-own">●</text>
    <text x="34" y="50" class="label-sub">owns / persists — value is held at rest in this component</text>

    <text x="14" y="74" class="glyph-trans">○</text>
    <text x="34" y="76" class="label-sub">transient — sees the value in memory briefly, does not persist</text>

    <text x="14" y="100" class="glyph-pass">↪</text>
    <text x="34" y="102" class="label-sub">transit — value crosses this component as part of a forwarded request, not inspected/stored</text>

    <text x="14" y="126" class="glyph-set">SET</text>
    <text x="50" y="128" class="label-sub">SET — this component is the authoritative writer of the value (anything inbound is stripped/overwritten first)</text>

    <text x="14" y="152" class="glyph-deny">✗</text>
    <text x="34" y="154" class="label-sub">MUST NOT see — explicitly stripped or never sent on this leg (e.g., Kong clears Authorization before forwarding to the service)</text>

    <text x="14" y="178" class="row-sub" fill="#9f1239">Key invariant: any change that lets a column to the right of BFF persist a KC token (rows 1-4) breaks the auth-boundary contract.</text>
  </g>
</svg>
