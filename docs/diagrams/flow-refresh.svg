<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 960" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="12">
  <title>Refresh Flow — Kong 401 → Dio interceptor → BFF /auth/refresh → retry</title>
  <desc>The mobile Dio ApiClient catches a single 401 from Kong, dedupes concurrent refreshes, calls /auth/refresh with the (possibly expired) bearer plus session_id, then retries the original request once with the new bearer.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <marker id="arrow-auth" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b45309"/>
    </marker>
    <marker id="arrow-data" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1d4ed8"/>
    </marker>
    <marker id="arrow-store" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6d28d9"/>
    </marker>
    <style>
      .box { fill:#ffffff; stroke:#334155; stroke-width:1.5; rx:10; }
      .box-bff    { fill:#fef3c7; stroke:#b45309; }
      .box-kong   { fill:#dbeafe; stroke:#1d4ed8; }
      .box-ext    { fill:#fde2e7; stroke:#9f1239; stroke-dasharray:6,4; }
      .box-store  { fill:#ede9fe; stroke:#6d28d9; }
      .box-mobile { fill:#f0f9ff; stroke:#0369a1; }

      .label-title { font-weight:700; font-size:14px; fill:#0f172a; }
      .label-sub   { font-size:11px; fill:#475569; }
      .lifeline    { stroke:#94a3b8; stroke-width:1; stroke-dasharray:3,4; }

      .msg-auth   { stroke:#b45309; stroke-width:1.8; fill:none; }
      .msg-data   { stroke:#1d4ed8; stroke-width:1.8; fill:none; }
      .msg-store  { stroke:#6d28d9; stroke-width:1.8; fill:none; }
      .msg-label  { font-size:11px; fill:#1f2937; }
      .note       { fill:#fef9c3; stroke:#a16207; stroke-width:1; rx:6; }
      .note-text  { font-size:11px; fill:#713f12; }
      .step-bg    { fill:#0f172a; }
      .step-num   { fill:#ffffff; font-weight:700; font-size:10px; }
    </style>
  </defs>

  <text x="540" y="28" text-anchor="middle" class="label-title" font-size="18">Refresh Flow — 401 from Kong triggers a transparent re-mint</text>
  <text x="540" y="48" text-anchor="middle" class="label-sub">Bearer expired ≤ 24 h is still accepted on /auth/refresh. The sid claim must equal the body session_id (closes leaked-sid attack).</text>

  <!-- Actor boxes -->
  <rect class="box box-mobile" x="60"  y="80" width="160" height="56"/>
  <text x="140" y="105" text-anchor="middle" class="label-title">Mobile (Dio)</text>
  <text x="140" y="123" text-anchor="middle" class="label-sub">_RefreshInterceptor</text>

  <rect class="box box-kong" x="240" y="80" width="160" height="56"/>
  <text x="320" y="105" text-anchor="middle" class="label-title">Kong</text>
  <text x="320" y="123" text-anchor="middle" class="label-sub">jwt plugin (RS256)</text>

  <rect class="box box-bff" x="440" y="80" width="160" height="56"/>
  <text x="520" y="105" text-anchor="middle" class="label-title">BFF</text>
  <text x="520" y="123" text-anchor="middle" class="label-sub">/auth/refresh</text>

  <rect class="box box-ext" x="660" y="80" width="160" height="56"/>
  <text x="740" y="105" text-anchor="middle" class="label-title">Keycloak (SSO)</text>
  <text x="740" y="123" text-anchor="middle" class="label-sub">EXTERNAL</text>

  <rect class="box box-store" x="860" y="80" width="160" height="56"/>
  <text x="940" y="105" text-anchor="middle" class="label-title">Redis</text>
  <text x="940" y="123" text-anchor="middle" class="label-sub">session store</text>

  <!-- Lifelines -->
  <line x1="140" y1="140" x2="140" y2="880" class="lifeline"/>
  <line x1="320" y1="140" x2="320" y2="880" class="lifeline"/>
  <line x1="520" y1="140" x2="520" y2="880" class="lifeline"/>
  <line x1="740" y1="140" x2="740" y2="880" class="lifeline"/>
  <line x1="940" y1="140" x2="940" y2="880" class="lifeline"/>

  <!-- Step 1: Mobile -> Kong (data) with expired bearer -->
  <line x1="140" y1="180" x2="318" y2="180" class="msg-data" marker-end="url(#arrow-data)"/>
  <circle cx="156" cy="174" r="9" class="step-bg"/><text x="156" y="178" text-anchor="middle" class="step-num">1</text>
  <text x="229" y="174" text-anchor="middle" class="msg-label" fill="#1d4ed8">GET /api/profile  + old Bearer</text>

  <!-- Step 2: Kong -> Mobile 401 -->
  <line x1="318" y1="220" x2="142" y2="220" class="msg-data" marker-end="url(#arrow-data)"/>
  <circle cx="304" cy="214" r="9" class="step-bg"/><text x="304" y="218" text-anchor="middle" class="step-num">2</text>
  <text x="229" y="214" text-anchor="middle" class="msg-label" fill="#1d4ed8">401  (exp in past)</text>

  <!-- Note: Dio dedupes -->
  <rect class="note" x="60" y="240" width="160" height="36"/>
  <text x="140" y="258" text-anchor="middle" class="note-text">_RefreshInterceptor catches</text>
  <text x="140" y="271" text-anchor="middle" class="note-text">single-flight via Completer</text>

  <!-- Step 3: Mobile -> BFF -->
  <line x1="140" y1="300" x2="518" y2="300" class="msg-auth" marker-end="url(#arrow-auth)"/>
  <circle cx="156" cy="294" r="9" class="step-bg"/><text x="156" y="298" text-anchor="middle" class="step-num">3</text>
  <text x="329" y="294" text-anchor="middle" class="msg-label">POST /auth/refresh  { session_id }   + Authorization: Bearer &lt;old-jwt&gt;</text>

  <!-- Note: BFF sessionAuth allowExpired -->
  <rect class="note" x="440" y="320" width="160" height="36"/>
  <text x="520" y="338" text-anchor="middle" class="note-text">verify allowExpired (≤24h)</text>
  <text x="520" y="351" text-anchor="middle" class="note-text">enforce claims.sid == body.sid</text>

  <!-- Step 4: BFF -> Redis GET session -->
  <line x1="520" y1="380" x2="938" y2="380" class="msg-store" marker-end="url(#arrow-store)"/>
  <circle cx="536" cy="374" r="9" class="step-bg"/><text x="536" y="378" text-anchor="middle" class="step-num">4</text>
  <text x="730" y="374" text-anchor="middle" class="msg-label" fill="#6d28d9">GET session:SID   → { refresh_token, sub, profile }</text>

  <!-- Step 5: BFF -> KC POST /token grant=refresh -->
  <line x1="520" y1="420" x2="738" y2="420" class="msg-auth" marker-end="url(#arrow-auth)"/>
  <circle cx="536" cy="414" r="9" class="step-bg"/><text x="536" y="418" text-anchor="middle" class="step-num">5</text>
  <text x="629" y="414" text-anchor="middle" class="msg-label">POST /token  grant=refresh_token + client_secret</text>

  <!-- Step 6: KC -> BFF rotated tokens -->
  <line x1="738" y1="460" x2="522" y2="460" class="msg-auth" marker-end="url(#arrow-auth)"/>
  <circle cx="724" cy="454" r="9" class="step-bg"/><text x="724" y="458" text-anchor="middle" class="step-num">6</text>
  <text x="630" y="454" text-anchor="middle" class="msg-label">{ access_token, refresh_token (rotated), id_token }</text>

  <!-- Note: re-verify id_token + access_token via JWKS -->
  <rect class="note" x="440" y="480" width="160" height="36"/>
  <text x="520" y="498" text-anchor="middle" class="note-text">verifyAndExtractProfile</text>
  <text x="520" y="511" text-anchor="middle" class="note-text">(KC JWKS; abort on fail)</text>

  <!-- Step 7: BFF -> Redis PUT session (rotated) -->
  <line x1="520" y1="540" x2="938" y2="540" class="msg-store" marker-end="url(#arrow-store)"/>
  <circle cx="536" cy="534" r="9" class="step-bg"/><text x="536" y="538" text-anchor="middle" class="step-num">7</text>
  <text x="730" y="534" text-anchor="middle" class="msg-label" fill="#6d28d9">PUT session:SID  ← refresh_token rotated, profile fresh, lastUsedAt=now</text>

  <!-- Note: mint new internal JWT -->
  <rect class="note" x="440" y="560" width="160" height="22"/>
  <text x="520" y="575" text-anchor="middle" class="note-text">mint RS256 (kid=active)</text>

  <!-- Step 8: BFF -> Mobile 200 -->
  <line x1="518" y1="610" x2="142" y2="610" class="msg-auth" marker-end="url(#arrow-auth)"/>
  <circle cx="504" cy="604" r="9" class="step-bg"/><text x="504" y="608" text-anchor="middle" class="step-num">8</text>
  <text x="330" y="604" text-anchor="middle" class="msg-label">200  { access_token = NEW internal-jwt, expires_in=300, session_id }</text>

  <!-- Step 9: Mobile retry -> Kong -->
  <line x1="140" y1="660" x2="318" y2="660" class="msg-data" marker-end="url(#arrow-data)"/>
  <circle cx="156" cy="654" r="9" class="step-bg"/><text x="156" y="658" text-anchor="middle" class="step-num">9</text>
  <text x="229" y="654" text-anchor="middle" class="msg-label" fill="#1d4ed8">RETRY GET /api/profile + NEW Bearer</text>

  <!-- Step 10: Kong -> Mobile 200 -->
  <line x1="318" y1="700" x2="142" y2="700" class="msg-data" marker-end="url(#arrow-data)"/>
  <circle cx="304" cy="694" r="9" class="step-bg"/><text x="304" y="698" text-anchor="middle" class="step-num">10</text>
  <text x="229" y="694" text-anchor="middle" class="msg-label" fill="#1d4ed8">200  (signature OK, exp future)</text>

  <!-- Failure branch annotation -->
  <rect class="note" x="60" y="740" width="960" height="100"/>
  <text x="80" y="760" class="label-title">Failure branches</text>
  <text x="80" y="780" class="label-sub">• KC returns invalid_grant on step 5 → BFF deletes session:SID, returns 401 invalid_session. Mobile bloc → unauthenticated, user must re-login.</text>
  <text x="80" y="798" class="label-sub">• Refreshed id_token fails JWKS verify → same: session purged, 401 invalid_session.</text>
  <text x="80" y="816" class="label-sub">• Mobile second 401 after retry → _RefreshInterceptor does NOT loop (alreadyRetried flag). 401 propagates to caller; auth bloc sees session=null via stream.</text>
</svg>
