_format_version: "3.0"
_transform: true

# DB-less Kong configuration. The BFF is the auth boundary; Kong's only job
# here is to validate the BFF-issued internal JWT before forwarding to the
# upstream service. See bff/docs/IMPROVEMENT_PLAN.md §2.2 for why we use
# RS256 (asymmetric) — Kong holds public keys only, never the signing key.
#
# AUDIT A-4: Kong sits on the DATA plane; the BFF is on the AUTH plane.
# That split is deliberate. Any feature that has Kong call the BFF on a
# per-request basis (token introspection, session lookup, etc.) defeats
# the design — the whole point of the RS256 internal JWT is that Kong can
# verify it without talking to the BFF. If you find yourself wanting Kong
# to "just check the session in Redis" on every request, push that check
# into the BFF instead.
#
# AUDIT P-3: Kong does NOT enable gzip / Brotli. nginx already terminates
# the client connection and gzips at the edge — adding compression here
# would be gzip-on-gzip, adding latency for no benefit. Do not enable any
# compression plugin on Kong.

services:
  - name: sample-service
    url: http://sample-service:3001

    routes:
      - name: sample-profile
        paths:
          - /api/profile
        strip_path: true
        # GET /api/profile        → upstream sees GET /
        # GET /api/profile/health → upstream sees GET /health

    plugins:
      # AUDIT M-4: correlation-id contract.
      # nginx is the chain origin: nginx/snippets/proxy_common.conf forces
      # `proxy_set_header X-Request-Id $request_id`, which OVERWRITES any
      # client-supplied X-Request-Id with nginx's freshly-minted hex id
      # before the request reaches Kong. The correlation-id plugin then
      # finds X-Request-Id already set and REUSES it (Kong only generates
      # when the header is missing). Result:
      #   - Client cannot inject log-poisoning ids (nginx clobbers them).
      #   - nginx / Kong / upstream / BFF logs all share the same id.
      # `echo_downstream: true` returns the id to the client so support
      # tickets can quote it.
      - name: correlation-id
        config:
          header_name: X-Request-Id
          generator: uuid
          echo_downstream: true

      # Kong's BUNDLED jwt plugin — no custom image, no luarocks. The plugin
      # finds the matching consumer credential by the token's `kid` claim
      # (we override the default key_claim_name=iss). The BFF mints tokens
      # with `kid` in BOTH the header (RFC 7515) and the payload (so this
      # lookup works without a custom plugin).
      - name: jwt
        config:
          key_claim_name: kid
          # AUDIT S-4: add `nbf` to the verified set so future-dated tokens
          # from a clock-drifted BFF are caught here, and pin a TTL ceiling
          # so a BFF misconfiguration (BFF_INTERNAL_JWT_TTL_SECONDS set to a
          # huge value) cannot produce tokens that outlive instant-revocation
          # tolerance. The BFF currently mints 5-min tokens (300s); the 600s
          # ceiling leaves headroom for the documented 5-min default plus
          # the rotation overlap window.
          claims_to_verify:
            - exp
            - nbf
          maximum_expiration: 600
          # AUDIT S-2: lock the token carrier to the Authorization header.
          # Kong's bundled jwt plugin otherwise also accepts the token via
          # cookies or ?jwt=... — those paths skip the identity-header
          # injection below (pre-function only reads Authorization) and
          # produce an "authenticated anonymous" request to the upstream.
          # Every client in this stack sends bearers, so header-only is safe.
          header_names:
            - authorization
          cookie_names: []
          uri_param_names: []

      # §2.13 — enforce iss/aud, inject identity headers, strip bearer.
      #
      # SPLIT ACROSS TWO PLUGINS — read the priorities carefully:
      #
      #   pre-function  : priority 1,000,000 — runs FIRST in access phase
      #   jwt           : priority     1,450 — runs SECOND (signature verify)
      #   rate-limiting : priority       910 — runs THIRD (reads X-User-Id)
      #   post-function : priority    -1,000 — runs LAST (strips bearer)
      #
      # AUDIT M-1 (REVISED 2026-05-13): the original comment here claimed
      # pre-function was priority 1000 and ran AFTER jwt. That was wrong —
      # Kong's bundled pre-function ships at priority 1,000,000 (verify with
      # `cat /usr/local/share/lua/5.1/kong/plugins/pre-function/handler.lua`
      # inside the Kong container). The old code path also called
      # `clear_header("authorization")` at the end of this script, which
      # stripped the bearer BEFORE jwt got a chance to verify it — every
      # /api/* call therefore 401'd with `WWW-Authenticate: Bearer` from the
      # jwt plugin's "no token found" path. The fix splits the work:
      # bearer-stripping moved to the `post-function` block below.
      #
      # pre-function responsibilities (this block):
      #   1. Strip ANY inbound X-User-Id / X-Roles / X-Session-Id from the
      #      caller — defends against header spoofing. Without this a client
      #      could send `X-User-Id: admin` and a downstream service that
      #      naively trusts the header would honor it.
      #   2. Decode the JWT payload and enforce iss/aud (AUDIT S-1). We
      #      decode WITHOUT signature verification here — that runs next, in
      #      the bundled jwt plugin. If the token is forged, jwt 401s and
      #      Kong never proxies, so any X-* headers we set on a forged
      #      token cannot reach the upstream service. We accept that trade
      #      because rate-limiting (priority 910) needs X-User-Id set before
      #      it runs, and pre-function is the only "execute Lua" slot above
      #      910 that Kong gives us declaratively.
      #   3. Re-set X-User-Id / X-Session-Id / X-Roles from the claims.
      #      Downstream services read identity from these headers instead
      #      of decoding JWTs themselves.
      #
      # post-function (below) handles step 4 (clear Authorization) after jwt
      # has verified the signature.
      #
      # AUDIT M-2: the Lua below is also kept in `kong/lua/identity_inject.lua`
      # as the reviewable canonical source. Kong's pre-function plugin has no
      # file-reference syntax in 3.x, so the YAML copy is what actually
      # executes. `kong/scripts/check-lua-sync.mjs` (CI gate) fails if the
      # two diverge. Edit BOTH together, then re-run the check.
      #
      # AUDIT P-4 (perf): this Lua runs in access-phase on every request and
      # decodes the JWT payload. JIT-compiled in OpenResty, so cost is
      # microseconds. If profiling ever flags it: stash the parsed claims in
      # `kong.ctx.shared` from here and let post-function re-use them.
      - name: pre-function
        config:
          access:
            - |
              -- step 1: strip caller-supplied identity headers
              kong.service.request.clear_header("X-User-Id")
              kong.service.request.clear_header("X-Roles")
              kong.service.request.clear_header("X-Session-Id")

              local auth = kong.request.get_header("authorization")
              if not auth then return end
              local token = string.match(auth, "^[Bb]earer%s+(.+)$")
              if not token then return end

              -- Pull the payload out of the JWT. We decode WITHOUT verifying the signature
              -- here: jwt plugin (priority 1450) runs after us and rejects the request if
              -- the signature is bad, so any X-* headers we set on a forged token never
              -- reach upstream (Kong 401s before proxying). We need to set X-User-Id
              -- before priority 910 so rate-limiting can limit per user — that is the
              -- whole reason this work is in pre-function and not post-function.
              --
              -- AUDIT S-9: all three captures use `+` (one-or-more) rather than the
              -- previous permissive `*` (zero-or-more) on the signature segment. Belt-
              -- and-braces: stops a malformed-but-decodable token from sliding through.
              local _, payload_b64 = string.match(token, "([^%.]+)%.([^%.]+)%.([^%.]+)")
              if not payload_b64 then return end
              local p = payload_b64:gsub("-", "+"):gsub("_", "/")
              local pad = #p % 4
              if pad > 0 then p = p .. string.rep("=", 4 - pad) end
              local raw = ngx.decode_base64(p)
              if not raw then return end

              local cjson = require "cjson.safe"
              local claims = cjson.decode(raw)
              if type(claims) ~= "table" then return end

              -- step 2: enforce iss/aud (AUDIT S-1).
              -- Hardcoded to match BFF_INTERNAL_JWT_ISSUER / _AUDIENCE defaults in
              -- .env.example. The PEM moved to env-vault under AUDIT S-5; these two
              -- strings could follow the same pattern but the Lua sandbox blocks
              -- `os.getenv` directly so it would mean either extending
              -- KONG_UNTRUSTED_LUA_SANDBOX_REQUIRES or threading them through Kong's
              -- vault API. Deferred — iss/aud change far less often than keys.
              local expected_iss = "super-app-bff"
              local expected_aud = "super-app-services"
              if claims.iss ~= expected_iss then
                return kong.response.exit(401, { message = "invalid issuer" })
              end
              local aud_ok = false
              if type(claims.aud) == "string" then
                aud_ok = claims.aud == expected_aud
              elseif type(claims.aud) == "table" then
                for _, a in ipairs(claims.aud) do
                  if a == expected_aud then aud_ok = true; break end
                end
              end
              if not aud_ok then
                return kong.response.exit(401, { message = "invalid audience" })
              end

              -- step 3: re-set headers from claims. jwt plugin verifies signature after
              -- us; if verification fails, Kong 401s before proxying so these never
              -- reach the upstream service.
              if claims.sub then
                kong.service.request.set_header("X-User-Id", tostring(claims.sub))
              end
              if claims.sid then
                kong.service.request.set_header("X-Session-Id", tostring(claims.sid))
              end
              if type(claims.roles) == "table" then
                local r = {}
                for i, v in ipairs(claims.roles) do
                  r[i] = tostring(v)
                end
                if #r > 0 then
                  kong.service.request.set_header("X-Roles", table.concat(r, ","))
                end
              end

              -- NOTE: Authorization-header stripping lives in the `post-function` plugin
              -- in kong.yml (priority -1000), which runs after jwt has verified the
              -- signature. Do not add `kong.service.request.clear_header("authorization")`
              -- here — doing so causes jwt to see no bearer and 401 every request.

      # AUDIT S-3 (split from pre-function 2026-05-13): strip the raw bearer
      # before forwarding upstream. Identity is already in X-User-Id /
      # X-Session-Id / X-Roles (set by pre-function above); the JWT has no
      # purpose downstream and only widens the blast radius if an upstream is
      # ever compromised.
      #
      # MUST be a post-function (priority -1000), not pre-function. Kong's
      # bundled pre-function runs at priority 1,000,000 — BEFORE jwt (1450).
      # Stripping the Authorization header in pre-function deletes the bearer
      # before jwt can verify it, producing a 401 on every authenticated
      # request. post-function runs after jwt has accepted the token, so
      # the header is safe to remove here.
      - name: post-function
        config:
          access:
            - |
              kong.service.request.clear_header("authorization")

      # AUDIT P-1: per-user rate limiting at the gateway. Runs at priority 910
      # which is below pre-function (1000), so X-User-Id has already been
      # injected from the verified JWT by the time this plugin reads it.
      # Unauthenticated requests are rejected at the jwt plugin (priority
      # 1450) before reaching here, so this is strictly an authenticated-user
      # limit. `policy: local` is fine while Kong is single-instance; switch
      # to `policy: redis` (sharing the BFF's existing Redis) once Kong is
      # replicated. fault_tolerant: true means a rate-limiter outage fails
      # OPEN — we'd rather serve traffic than 500 if Redis blips later.
      - name: rate-limiting
        config:
          minute: 600
          policy: local
          fault_tolerant: true
          limit_by: header
          header_name: X-User-Id

# AUDIT S-6: global request body-size ceiling. nginx already caps client
# uploads at 64k (proxy_common.conf:15), but if Kong is ever exposed to
# another ingress (cluster mesh, alt load balancer, or directly) the
# nginx-side cap is bypassed. 256 KB is generous for the JSON-only API
# surface; bump per-service if a real endpoint legitimately needs more.
#
# AUDIT PR-2: Prometheus metrics. Exposed via Kong's Status API on
# :8100/metrics (KONG_STATUS_LISTEN in docker-compose.yml). The Status API
# is bound to the internal Docker network only — never expose to the
# public internet, same caveat as the BFF's /metrics.
#
# AUDIT M-3: structured JSON access log. Kong's default text access log
# (KONG_PROXY_ACCESS_LOG=/dev/stdout) has no field for X-Request-Id, so a
# 5xx visible in Kong's log can't be tied to nginx/BFF/service traces.
# The bundled `file-log` plugin emits one JSON object per request with the
# request headers (incl. x-request-id), latencies, route, service, and
# response status. Pointed at /dev/stdout so it interleaves with the
# nginx-style log in container stdout — log aggregators can filter by
# format. Higher-volume deploys should switch to `http-log` or `tcp-log`
# to ship asynchronously.
plugins:
  - name: request-size-limiting
    config:
      allowed_payload_size: 256
      size_unit: kilobytes
      require_content_length: false

  - name: prometheus
    config:
      status_code_metrics: true
      latency_metrics: true
      upstream_health_metrics: true

  - name: file-log
    config:
      path: /dev/stdout
      reopen: false

# A single Kong consumer represents the BFF (the issuer of internal JWTs).
# Each `jwt_secrets` entry is a (kid, public-key) pair. To rotate a key:
# append a new entry, deploy, wait for old tokens to expire, drop the old
# entry. See kong/README.md "Key rotation" for the runbook.
#
# AUDIT S-5: the kid is `dev-v1`, not `v1`. The `dev-` prefix is a tripwire
# — a kid that obviously says "development" must never trust a real prod
# token, so the matching private key staying on a developer laptop is the
# desired posture. For prod, the deploy artifact must:
#   1. Use a different kid (`prod-v1`, `prod-v2`, ...)
#   2. Inline the prod public PEM under `rsa_public_key: |` in the prod
#      kong.yml (sourced from the secret manager at deploy time).
#
# Why inline and not `{vault://env/...}`: Kong 3.x DB-less validates the
# `consumers.jwt_secrets` entity at config-parse time, BEFORE vault
# references are resolved. A `{vault://env/internal-jwt-pubkey-dev-v1}`
# value therefore reaches the RS256 conditional validator as a literal
# string, which it rejects with "rsa_public_key: invalid key" and
# init_by_lua aborts (Kong won't start, healthcheck never passes,
# nginx fails to launch with "dependency failed: super-app-kong is
# unhealthy"). The dev PEM is not secret — its matching private key is
# committed under bff/keys/ — so inlining it here is safe; for prod the
# PEM is also not a secret (the private half is in your secret manager),
# so the same pattern applies. Different env, different file content,
# same shape.
consumers:
  - username: super-app-bff
    jwt_secrets:
      - key: dev-v1
        algorithm: RS256
        rsa_public_key: |
          -----BEGIN PUBLIC KEY-----
          MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA4iCsrrXkdFofVghLXfbc
          6ERoqVfi7fSPTowVQfiHiheAih3rT2jtnLZNmj0T+peOJNXHgsMRpSB8l1WgVVvt
          IXL9BN417ewE1MpeArfI1jD5uj5X/c+q1elX3iwN5kCAO0uNmFYdyurFrW9dsGXQ
          RJ08ba2lnZwW1DWF4mfsaMiXS0P8/m5JQYKrnqI3f9AiguZYWvq0DRatbHLYSOA5
          pvHmgdCpVUj45T1+FeZ4A9/yPpDQnnYYTELqWo+XkQzhoFEM3ZH9SJWXXZgnu9+R
          7xQC09bOFqOeG6GcnQVVPtpcNgv/NIHGXQmxtMF840RU55epaXatBxvlbBs6X3eh
          xwIDAQAB
          -----END PUBLIC KEY-----
