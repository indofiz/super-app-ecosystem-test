worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 65;
    server_tokens off;

    # AUDIT S-2: slowloris / slow-body defenses. Defaults are 60s each — long
    # enough for a single IP to tie up a worker slot trickle-feeding bytes.
    client_header_timeout 10s;
    client_body_timeout   10s;
    send_timeout          10s;
    reset_timedout_connection on;

    # AUDIT S-2: per-IP connection cap. Paired with limit_req zones below so
    # connection-count and request-rate limits compose.
    limit_conn_zone $binary_remote_addr zone=perip:10m;

    # AUDIT S-5: trust chain for X-Forwarded-For. Without these, the moment
    # a cloud LB or CDN is added in front of nginx, $remote_addr becomes the
    # LB's IP and the client-controlled XFF prefix is forwarded verbatim —
    # collapsing every external client into a single rate-limit bucket and
    # letting clients spoof their own IP via XFF.
    #
    # Trusted CIDRs (extend as needed for your LB / VPC topology):
    #   10.0.0.0/8       — typical VPC / k8s ClusterIP / cloud LB
    #   172.16.0.0/12    — docker bridge networks (compose default)
    #   192.168.0.0/16   — private LAN / dev hosts
    #   127.0.0.1/32     — loopback (sidecar / healthcheck patterns)
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    set_real_ip_from 127.0.0.1/32;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;
    # NOTE: when an LB lands in front of nginx, bump bff/src/app.ts
    # `trust proxy: 1` to the number of trusted hops (LB + nginx = 2).

    # JSON access log with request_id and upstream timing.
    # Note: $args is intentionally omitted so OAuth `code` / `state` query
    # params don't land on disk.
    log_format main escape=json
        '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"path":"$uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"referer":"$http_referer",'
        '"ua":"$http_user_agent",'
        '"xff":"$http_x_forwarded_for",'
        '"req_id":"$request_id",'
        '"upstream":"$upstream_addr",'
        '"upstream_status":"$upstream_status",'
        '"upstream_time":"$upstream_response_time",'
        '"request_time":$request_time'
        '}';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    # AUDIT P-2: comp_level 5 — negligible CPU at our traffic shape, real
    # bandwidth saving on JSON responses.
    gzip_comp_level 5;
    # AUDIT P-2: include RFC 7807 problem-details and JSON:API content types.
    # nginx normalizes "application/json; charset=utf-8" against the bare
    # type already, but `+json` suffixes need to be listed explicitly.
    gzip_types text/plain text/css text/xml
               application/json application/problem+json application/vnd.api+json
               application/javascript application/xml application/xml+rss;

    # AUDIT S-10: generous global body cap for /api/* (future file/photo
    # uploads, document submissions). Each /auth/* location tightens this
    # back down to 64k via its own client_max_body_size directive.
    client_max_body_size 4m;

    # Per-IP rate limit zones (defense-in-depth on top of the BFF's own limits).
    limit_req_zone $binary_remote_addr zone=auth_token:10m   rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth_default:10m rate=30r/s;
    # AUDIT S-3: data-plane edge limit. Kong has no rate-limit plugin (see
    # kong/AUDIT.md P-3), so without this the /api/* path has no ceiling.
    limit_req_zone $binary_remote_addr zone=api_default:10m  rate=100r/s;

    include /etc/nginx/conf.d/*.conf;
}
