add_header X-Content-Type-Options "nosniff"     always;
add_header X-Frame-Options        "DENY"        always;
add_header Referrer-Policy        "no-referrer" always;
# AUDIT S-7: echo nginx's $request_id so clients can quote it when reporting
# errors. The BFF already threads this header through pino-http.
add_header X-Request-Id           $request_id   always;
# AUDIT S-8: deny every powerful browser feature by default. The mobile
# clients we ship don't need geolocation / camera / mic / payment, and any
# future web client should opt in explicitly per route. () is the "allow
# no origin" syntax — empty allowlist.
add_header Permissions-Policy     "accelerometer=(),ambient-light-sensor=(),autoplay=(),battery=(),camera=(),display-capture=(),document-domain=(),encrypted-media=(),fullscreen=(),geolocation=(),gyroscope=(),hid=(),identity-credentials-get=(),idle-detection=(),local-fonts=(),magnetometer=(),microphone=(),midi=(),otp-credentials=(),payment=(),picture-in-picture=(),publickey-credentials-create=(),publickey-credentials-get=(),screen-wake-lock=(),serial=(),storage-access=(),usb=(),web-share=(),window-management=(),xr-spatial-tracking=()" always;
# AUDIT S-8: lock down cross-origin window references and resource embeds.
# Cheap defense-in-depth even on an API edge.
add_header Cross-Origin-Opener-Policy   "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;
# HSTS is added in the production TLS server block, never on plain HTTP.
