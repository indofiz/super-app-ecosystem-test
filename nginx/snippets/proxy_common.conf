# Common proxy_pass plumbing — included at every upstream-routed location.
proxy_http_version 1.1;
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $host;
proxy_set_header X-Request-Id      $request_id;
proxy_set_header Connection        "";

proxy_connect_timeout 5s;
proxy_send_timeout    30s;
proxy_read_timeout    30s;

# AUDIT S-10: body-size cap lives per-location now (4m global default in
# nginx.conf, 64k override on each /auth/* block). Keeping it out of this
# shared snippet means a future /api/upload route can ship without a
# mysterious 413.

proxy_buffering       on;
proxy_intercept_errors off;

# AUDIT P-4: explicit retry policy. With one upstream server per pool today
# this is a no-op, but it locks in the safe default for the day someone adds
# a second BFF replica — auto-retry on POST /auth/token would mint two
# bffcode records for one login. proxy_next_upstream_tries 1 disables retry
# entirely; /api/ can override per-location later if idempotent reads
# dominate and a higher retry budget is wanted.
proxy_next_upstream        error timeout http_502 http_503 http_504;
proxy_next_upstream_tries  1;
