name: bff

on:
  push:
    branches: [main]
    paths:
      - 'bff/**'
      - '.github/workflows/bff.yml'
  pull_request:
    paths:
      - 'bff/**'
      - '.github/workflows/bff.yml'

defaults:
  run:
    working-directory: bff

jobs:
  test:
    name: typecheck + lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: bff/package-lock.json

      - run: npm ci

      - name: typecheck
        run: npm run typecheck

      - name: lint
        run: npm run lint

      - name: test (with coverage)
        run: npm test -- --coverage

      - name: upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bff-coverage
          path: bff/coverage/
          if-no-files-found: ignore

  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: bff/package-lock.json

      - run: npm ci

      - name: npm audit (prod deps, high+ only)
        run: npm audit --audit-level=high --omit=dev

  docker:
    name: docker build + Trivy scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: docker build
        run: docker build -t bff:ci .

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: bff:ci
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true
